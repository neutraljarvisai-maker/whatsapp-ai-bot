<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background: #050505;
            color: #00d4ff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            border: 1px solid #005577;
            box-shadow: inset 0 0 100px rgba(0, 212, 255, 0.1);
        }
        .hud-grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image:
                linear-gradient(rgba(0, 85, 119, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 85, 119, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: -1;
        }
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 100;
        }
        .header {
            padding: 15px;
            text-align: left;
            background: rgba(0, 85, 119, 0.1);
            border-bottom: 1px solid #005577;
            -webkit-app-region: drag;
            font-weight: bold;
            font-size: 0.9em;
            letter-spacing: 4px;
            display: flex;
            justify-content: space-between;
        }
        .sphere-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .sphere {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, #00d4ff 0%, #005577 70%, transparent 100%);
            border-radius: 50%;
            box-shadow: 0 0 30px #00d4ff;
            animation: pulse 2s infinite ease-in-out;
        }
        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.7; box-shadow: 0 0 20px #00d4ff; }
            50% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 50px #00d4ff; }
            100% { transform: scale(0.9); opacity: 0.7; box-shadow: 0 0 20px #00d4ff; }
        }
        .chat-container {
            height: 200px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
            overflow-y: auto;
            font-size: 0.9em;
        }
        .input-container {
            padding: 10px;
            display: flex;
        }
        input {
            flex-grow: 1;
            background: rgba(0, 85, 119, 0.2);
            border: 1px solid #005577;
            color: #00d4ff;
            padding: 5px;
            border-radius: 5px;
            outline: none;
        }
        .status {
            font-size: 0.7em;
            text-align: center;
            padding: 5px;
            color: #0088aa;
        }
    </style>
</head>
<body>
    <div class="hud-grid"></div>
    <div class="scanlines"></div>
    <div class="header">
        <span>VECTA OS v2.0 // HOLOGRAPHIC INTERFACE</span>
        <span id="clock">00:00:00</span>
    </div>
    <div class="sphere-container">
        <div id="canvas-container"></div>
    </div>
    <div id="status" class="status">SYSTEM IDLE</div>
    <div class="chat-container" id="chat">
        <div>Welcome, Master Wayne.</div>
    </div>
    <div class="input-container">
        <input type="text" id="userInput" placeholder="Awaiting instructions...">
    </div>

    <script>
        // Clock
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        const axios = require('axios');
        const { ipcRenderer } = require('electron');
        const VectaCore = require('./vecta_core.js');
        const fs = require('fs');
        const path = require('path');

        // Load Config
        let config = { JARVIS_BACKEND_URL: 'http://localhost:5000', JARVIS_USER_ID: 'default_user' };
        try {
            const configPath = path.join(__dirname, '..', 'config.json');
            if (fs.existsSync(configPath)) {
                config = JSON.parse(fs.readFileSync(configPath, 'utf8'));
            }
        } catch (err) {
            console.error('Error loading config:', err);
        }
        const input = document.getElementById('userInput');
        const chat = document.getElementById('chat');
        const status = document.getElementById('status');
        const core = new VectaCore('canvas-container');

        input.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                const text = input.value;
                input.value = '';
                addMessage('You', text);

                status.innerText = 'PROCESSING...';
                core.setState('THINKING');
                try {
                    const response = await axios.post(`${config.JARVIS_BACKEND_URL}/api/v1/chat`, {
                        user_id: config.JARVIS_USER_ID,
                        message: text
                    });
                    addMessage('VECTA', response.data.response);
                    core.setState('SPEAKING');
                    setTimeout(() => core.setState('IDLE'), 3000);

                    if (response.data.intent === 'TASK') {
                        status.innerText = 'EXECUTING TASK...';
                        ipcRenderer.send('run-task', response.data.task);
                    }
                } catch (err) {
                    addMessage('System', 'Connection to brain lost.');
                    core.setState('IDLE');
                }
                status.innerText = 'SYSTEM IDLE';
            }
        });

        ipcRenderer.on('task-status', (event, msg) => {
            status.innerText = msg.toUpperCase();
            if (msg.includes('LISTENING')) core.setState('LISTENING');
            else if (msg.includes('CLICK') || msg.includes('TYPE')) core.setState('THINKING');
        });

        ipcRenderer.on('task-finished', (event, msg) => {
            addMessage('System', msg);
            status.innerText = 'SYSTEM IDLE';
        });

        function addMessage(sender, text) {
            const div = document.createElement('div');
            div.innerHTML = `<strong>${sender}:</strong> ${text}`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
